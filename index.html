<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Marketplace</title>
    <link rel="stylesheet" href="index.css"/>
</head>
<body>

<header>
    <h1>Laptop Market</h1>
    <a href="cart.html" class="cart-link">🛒 Cart (<span id="cartCount">0</span>)</a>
</header>

<div class="container">
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search by brand...">
        <select id="priceFilter">
            <option value="all">All Prices</option>
            <option value="1000">Under $1000</option>
            <option value="2000">Under $2000</option>
        </select>
        <button id="searchBtn" class="btn-search">Search</button>
    </div>

    <div id="results" class="results-grid"></div>
</div>

<script src="index.js"></script>

</body>
</html>
